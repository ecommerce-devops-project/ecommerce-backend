name: Backend CI

on:
  push:
    branches:
      - '**'

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install
        working-directory: ecommerce-backend-node

      - name: Verify Server File
        run: ls
        working-directory: ecommerce-backend-node

      - name: Build Docker Image
        run: docker build -t ecommerce-backend .
        working-directory: ecommerce-backend-node