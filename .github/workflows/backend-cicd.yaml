name: Backend CI-CD

on:
  push:
    branches:
      - '**'

jobs:
  backend-build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install
        working-directory: ecommerce-backend-node

      - name: Verify Server File
        run: ls
        working-directory: ecommerce-backend-node

      - name: Build Docker Image
        run: docker build -t rahulpallavi/ecommerce-backend:${{ github.run_number }} .
        working-directory: ecommerce-backend-node

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push rahulpallavi/ecommerce-backend:${{ github.run_number }}

      - name: Deploy to Kubernetes
        run: |
          cd ~/projects/ecommerce-k8s-manifests/ecommerce-chart

            helm upgrade --install ecommerce . \
            -n ecommerce \
            --set backend.image.tag=${{ github.run_number }}

          kubectl rollout status deployment/ecommerce-backend -n ecommerce